name: Update activity graph

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prefer a PAT (repo secret ACTIVITY_GRAPH_TOKEN) so private contributions are included.
      # Falls back to GITHUB_TOKEN (public contributions only).
      - name: Generate graph
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIVITY_GRAPH_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USERNAME: Chadoud
        run: python3 scripts/generate-activity-graph.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-graph.svg
          git diff --staged --quiet || git commit -m "chore: refresh activity graph"
          git push
